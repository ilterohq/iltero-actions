# =============================================================================
# ilterohq/iltero-actions/monitor
# =============================================================================
# Monitor deployed infrastructure for drift detection and runtime compliance.
#
# This action:
#   1. Validates self-contained unit structure
#   2. Initializes Terraform with backend configuration
#   3. Detects configuration drift via terraform plan
#   4. Runs runtime compliance scan
#   5. Performs optional health checks on endpoints
#   6. Submits metrics to Iltero API
#   7. Creates alerts on drift detection
#
# Requires: ilterohq/iltero-actions/setup@v1 to be run first.
#
# IMPORTANT: Uses self-contained units architecture where each unit has:
#   - main.tf, providers.tf, versions.tf, backend.tf in the unit directory
#   - config/{environment}.tfvars for environment-specific variables
#   - config/backend/{environment}.hcl for backend configuration
#
# Usage:
#   - uses: ilterohq/iltero-actions/monitor@v1
#     with:
#       path: infra/stacks/my-stack/units/network
#       stack-id: 0b278217-a809-465a-b9df-00eda8414cb8
#       unit: network-baseline
#       environment: production
#     env:
#       ILTERO_TOKEN: ${{ secrets.ILTERO_TOKEN }}
#       # ILTERO_API_URL: ${{ vars.ILTERO_API_URL }}  # Optional, defaults to https://api.iltero.io
# =============================================================================

name: Iltero Monitor
description: Monitor infrastructure for drift detection and runtime compliance
author: Iltero

branding:
  icon: activity
  color: purple

inputs:
  path:
    description: |
      Path to the self-contained Terraform unit.
      Must contain: main.tf, providers.tf, versions.tf, backend.tf
      Example: 'infra/stacks/my-stack/units/network'
    required: true

  stack-id:
    description: |
      Iltero stack UUID. Get this from your stack's config.yml or the dashboard.
    required: true

  stack-name:
    description: |
      Stack name/slug for display and alerts.
    required: true

  unit:
    description: |
      Name of the infrastructure unit being monitored.
    required: true

  environment:
    description: |
      Target environment (e.g., 'production', 'staging', 'development').
    required: true

  check-drift:
    description: |
      Whether to check for configuration drift.
    required: false
    default: 'true'

  run-compliance:
    description: |
      Whether to run runtime compliance scan.
    required: false
    default: 'true'

  check-health:
    description: |
      Whether to check health endpoints from outputs.
    required: false
    default: 'false'

  health-output-key:
    description: |
      Terraform output key containing health endpoint(s).
      Example: 'load_balancer_dns'
    required: false
    default: ''

  create-issue-on-drift:
    description: |
      Create a GitHub issue when drift is detected.
    required: false
    default: 'true'

  github-token:
    description: |
      GitHub token for creating issues.
      Defaults to GITHUB_TOKEN if not provided.
    required: false
    default: ''

outputs:
  drift-detected:
    description: Whether configuration drift was detected (true/false)
    value: ${{ steps.drift.outputs.drift-detected }}

  resources-count:
    description: Number of resources managed by this unit
    value: ${{ steps.drift.outputs.resources-count }}

  compliance-passed:
    description: Whether runtime compliance scan passed (true/false)
    value: ${{ steps.compliance.outputs.passed }}

  health-status:
    description: Health check status (healthy/unhealthy/skipped)
    value: ${{ steps.health.outputs.status }}

runs:
  using: composite
  steps:
    # -------------------------------------------------------------------------
    # Validate Self-Contained Unit Structure
    # -------------------------------------------------------------------------
    - name: Validate Unit Structure
      id: validate
      shell: bash
      env:
        UNIT_PATH: ${{ inputs.path }}
        UNIT_NAME: ${{ inputs.unit }}
        ENVIRONMENT: ${{ inputs.environment }}
      run: |
        set -euo pipefail

        echo "::group::Validate: ${UNIT_NAME}"

        if [[ ! -d "$UNIT_PATH" ]]; then
          echo "::error::Unit directory not found: $UNIT_PATH"
          exit 1
        fi

        # Verify self-contained unit has required terraform files
        REQUIRED_FILES=("main.tf" "providers.tf" "versions.tf" "backend.tf")
        MISSING_FILES=()

        for f in "${REQUIRED_FILES[@]}"; do
          if [[ ! -f "$UNIT_PATH/$f" ]]; then
            MISSING_FILES+=("$f")
          fi
        done

        if [[ ${#MISSING_FILES[@]} -gt 0 ]]; then
          echo "::error::Missing required terraform files: ${MISSING_FILES[*]}"
          exit 1
        fi

        # Check for backend config
        BACKEND_CONFIG="$UNIT_PATH/config/backend/${ENVIRONMENT}.hcl"
        if [[ -f "$BACKEND_CONFIG" ]]; then
          echo "backend-config=$BACKEND_CONFIG" >> $GITHUB_OUTPUT
        else
          echo "::warning::No backend config found at $BACKEND_CONFIG"
          echo "backend-config=" >> $GITHUB_OUTPUT
        fi

        echo "[PASS] Unit structure validated"
        echo "::endgroup::"

    # -------------------------------------------------------------------------
    # Terraform Init
    # -------------------------------------------------------------------------
    - name: Terraform Init
      id: init
      shell: bash
      working-directory: ${{ inputs.path }}
      env:
        BACKEND_CONFIG: ${{ steps.validate.outputs.backend-config }}
      run: |
        set -euo pipefail

        echo "::group::Terraform Init"

        if [[ -n "$BACKEND_CONFIG" ]] && [[ -f "$BACKEND_CONFIG" ]]; then
          terraform init -backend-config="$BACKEND_CONFIG" -input=false
        else
          terraform init -input=false
        fi

        echo "[PASS] Terraform initialized"
        echo "::endgroup::"

    # -------------------------------------------------------------------------
    # Drift Detection
    # -------------------------------------------------------------------------
    - name: Check for Drift
      id: drift
      if: inputs.check-drift == 'true'
      shell: bash
      working-directory: ${{ inputs.path }}
      env:
        UNIT_NAME: ${{ inputs.unit }}
      run: |
        set -euo pipefail

        echo "::group::Drift Detection"

        # Refresh state to get current actual state
        terraform refresh -input=false || true

        # Check for drift using detailed exit code
        # Exit code 0 = no changes, 1 = error, 2 = changes detected
        set +e
        terraform plan -detailed-exitcode -input=false -out=/dev/null 2>&1
        PLAN_EXIT=$?
        set -e

        DRIFT_DETECTED="false"
        if [[ "$PLAN_EXIT" == "2" ]]; then
          echo "::warning::Configuration drift detected in ${UNIT_NAME}"
          DRIFT_DETECTED="true"
        elif [[ "$PLAN_EXIT" == "0" ]]; then
          echo "[PASS] No drift detected"
        else
          echo "::warning::Terraform plan failed (exit code: $PLAN_EXIT)"
        fi

        # Get resource count
        RESOURCES_COUNT=$(terraform state list 2>/dev/null | wc -l | tr -d ' ' || echo "0")

        # Export outputs for other steps
        terraform output -json > /tmp/${UNIT_NAME}_outputs.json 2>/dev/null || echo "{}" > /tmp/${UNIT_NAME}_outputs.json

        echo "drift-detected=$DRIFT_DETECTED" >> $GITHUB_OUTPUT
        echo "resources-count=$RESOURCES_COUNT" >> $GITHUB_OUTPUT
        echo "outputs-file=/tmp/${UNIT_NAME}_outputs.json" >> $GITHUB_OUTPUT

        echo "::endgroup::"

    # -------------------------------------------------------------------------
    # Runtime Compliance Scan
    # -------------------------------------------------------------------------
    - name: Runtime Compliance Scan
      id: compliance
      if: inputs.run-compliance == 'true'
      shell: bash
      env:
        UNIT_PATH: ${{ inputs.path }}
        STACK_ID: ${{ inputs.stack-id }}
        UNIT_NAME: ${{ inputs.unit }}
        ENVIRONMENT: ${{ inputs.environment }}
      run: |
        set -euo pipefail

        echo "::group::Runtime Compliance Scan"

        # Skip if CLI not available or API not configured
        if ! command -v iltero &> /dev/null; then
          echo "::warning::Iltero CLI not installed, skipping compliance scan"
          echo "passed=skipped" >> $GITHUB_OUTPUT
          exit 0
        fi

        if [[ -z "${ILTERO_API_URL:-}" ]] || [[ -z "${ILTERO_TOKEN:-}" ]]; then
          echo "::warning::ILTERO_API_URL or ILTERO_TOKEN not set, skipping compliance scan"
          echo "passed=skipped" >> $GITHUB_OUTPUT
          exit 0
        fi

        RESULTS_FILE="/tmp/runtime-compliance-${UNIT_NAME}.json"

        set +e
        iltero scan runtime "$UNIT_PATH" \
          --stack-id "$STACK_ID" \
          --unit "$UNIT_NAME" \
          --environment "$ENVIRONMENT" \
          --output json \
          --output-file "$RESULTS_FILE" \
          --external-run-id "$GITHUB_RUN_ID"
        EXIT_CODE=$?
        set -e

        if [[ $EXIT_CODE -eq 0 ]]; then
          echo "[PASS] Runtime compliance scan passed"
          echo "passed=true" >> $GITHUB_OUTPUT
        else
          echo "::warning::Runtime compliance scan found issues (exit code: $EXIT_CODE)"
          echo "passed=false" >> $GITHUB_OUTPUT
        fi

        echo "::endgroup::"

    # -------------------------------------------------------------------------
    # Health Checks
    # -------------------------------------------------------------------------
    - name: Check Health Endpoints
      id: health
      if: inputs.check-health == 'true' && inputs.health-output-key != ''
      shell: bash
      env:
        UNIT_NAME: ${{ inputs.unit }}
        OUTPUT_KEY: ${{ inputs.health-output-key }}
        OUTPUTS_FILE: ${{ steps.drift.outputs.outputs-file }}
      run: |
        set -euo pipefail

        echo "::group::Health Checks"

        if [[ ! -f "$OUTPUTS_FILE" ]]; then
          echo "::warning::No outputs file found"
          echo "status=skipped" >> $GITHUB_OUTPUT
          exit 0
        fi

        # Extract endpoint(s) from outputs
        ENDPOINTS=$(jq -r ".${OUTPUT_KEY}.value // empty" "$OUTPUTS_FILE" 2>/dev/null || echo "")

        if [[ -z "$ENDPOINTS" ]]; then
          echo "::warning::No endpoints found in output key: $OUTPUT_KEY"
          echo "status=skipped" >> $GITHUB_OUTPUT
          exit 0
        fi

        ALL_HEALTHY=true

        # Handle both single endpoint and array
        if [[ "$ENDPOINTS" == "["* ]]; then
          # Array of endpoints
          ENDPOINTS=$(echo "$ENDPOINTS" | jq -r '.[]' 2>/dev/null || echo "$ENDPOINTS")
        fi

        for endpoint in $ENDPOINTS; do
          echo "Checking: $endpoint"

          # Try /health endpoint first, then root
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 "http://$endpoint/health" 2>/dev/null || echo "000")

          if [[ "$HTTP_STATUS" == "000" ]] || [[ "$HTTP_STATUS" -ge 400 ]]; then
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 "http://$endpoint/" 2>/dev/null || echo "000")
          fi

          if [[ "$HTTP_STATUS" -ge 200 ]] && [[ "$HTTP_STATUS" -lt 400 ]]; then
            echo "[PASS] Healthy: $endpoint (HTTP $HTTP_STATUS)"
          else
            echo "::warning::Unhealthy: $endpoint (HTTP $HTTP_STATUS)"
            ALL_HEALTHY=false
          fi
        done

        if [[ "$ALL_HEALTHY" == "true" ]]; then
          echo "status=healthy" >> $GITHUB_OUTPUT
        else
          echo "status=unhealthy" >> $GITHUB_OUTPUT
        fi

        echo "::endgroup::"

    # -------------------------------------------------------------------------
    # Submit Metrics to Iltero
    # -------------------------------------------------------------------------
    - name: Submit Metrics
      if: always()
      shell: bash
      env:
        STACK_ID: ${{ inputs.stack-id }}
        UNIT_NAME: ${{ inputs.unit }}
        ENVIRONMENT: ${{ inputs.environment }}
        DRIFT_DETECTED: ${{ steps.drift.outputs.drift-detected }}
        RESOURCES_COUNT: ${{ steps.drift.outputs.resources-count }}
        COMPLIANCE_PASSED: ${{ steps.compliance.outputs.passed }}
        HEALTH_STATUS: ${{ steps.health.outputs.status }}
      run: |
        set -euo pipefail

        echo "::group::Submit Metrics"

        # Build CLI command args
        CLI_ARGS=(
          "--stack-id" "$STACK_ID"
          "--unit" "$UNIT_NAME"
          "--environment" "$ENVIRONMENT"
          "--resources-count" "${RESOURCES_COUNT:-0}"
          "--health-status" "${HEALTH_STATUS:-unknown}"
          "--external-run-id" "$GITHUB_RUN_ID"
          "--external-run-url" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          "--output" "json"
        )

        # Add drift flag
        if [[ "${DRIFT_DETECTED:-false}" == "true" ]]; then
          CLI_ARGS+=("--drift-detected")
        else
          CLI_ARGS+=("--no-drift")
        fi

        # Add compliance flag if available
        if [[ "${COMPLIANCE_PASSED:-}" == "true" ]]; then
          CLI_ARGS+=("--compliance-passed")
        elif [[ "${COMPLIANCE_PASSED:-}" == "false" ]]; then
          CLI_ARGS+=("--compliance-failed")
        fi
        # If "skipped" or empty, don't include compliance flag

        # Use CLI command for proper retry logic and auth handling
        if iltero monitor submit-metrics "${CLI_ARGS[@]}"; then
          echo "[PASS] Metrics submitted successfully"
        else
          echo "::warning::Failed to submit metrics via CLI"
        fi

        echo "::endgroup::"

    # -------------------------------------------------------------------------
    # Create Alert Issue on Drift
    # -------------------------------------------------------------------------
    - name: Alert on Drift
      if: steps.drift.outputs.drift-detected == 'true' && inputs.create-issue-on-drift == 'true'
      uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
      env:
        STACK_NAME: ${{ inputs.stack-name }}
        UNIT_NAME: ${{ inputs.unit }}
        ENVIRONMENT: ${{ inputs.environment }}
        RESOURCES_COUNT: ${{ steps.drift.outputs.resources-count }}
      with:
        github-token: ${{ inputs.github-token || github.token }}
        script: |
          const stackName = process.env.STACK_NAME;
          const unitName = process.env.UNIT_NAME;
          const environment = process.env.ENVIRONMENT;
          const resourcesCount = process.env.RESOURCES_COUNT;

          const title = `[Drift Alert] ${unitName} in ${environment}`;

          // Check for existing open drift issue
          const existingIssues = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels: 'drift-alert',
            per_page: 100
          });

          const duplicateIssue = existingIssues.data.find(
            issue => issue.title === title
          );

          if (duplicateIssue) {
            // Add comment to existing issue
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: duplicateIssue.number,
              body: `## Drift still detected\n\n**Time:** ${new Date().toISOString()}\n**Resources:** ${resourcesCount}\n**Run:** ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`
            });
            console.log(`Updated existing drift issue #${duplicateIssue.number}`);
          } else {
            // Create new issue
            const body = `## Configuration Drift Detected

          **Stack:** ${stackName}
          **Unit:** ${unitName}
          **Environment:** ${environment}
          **Resources:** ${resourcesCount}
          **Time:** ${new Date().toISOString()}

          ### Investigation Steps

          1. Check the monitoring run: ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}
          2. Review the terraform plan output to identify drifted resources
          3. Determine if drift is expected (manual change) or unexpected
          4. Either apply changes to align code with state, or re-apply to fix drift

          ### Resolution

          Once resolved, close this issue.`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['drift-alert', 'infrastructure', environment]
            });

            console.log(`Created new drift alert issue for ${unitName}`);
          }
