# =============================================================================
# Multi-Environment Iltero Workflow
# =============================================================================
# This workflow demonstrates multi-environment support with automatic
# environment detection from branch names via git_ref mapping.
#
# Branch → Environment Mapping (defined in config.yml):
#   - develop → development
#   - staging → staging
#   - main → production
#
# The action automatically detects which environment to use based on
# the current branch by reading environments.*.git_ref.name from config.yml.
# =============================================================================

name: Iltero Multi-Environment

on:
  push:
    branches:
      - main        # → production
      - staging     # → staging
      - develop     # → development
    paths:
      - 'infra/stacks/**'
  pull_request:
    paths:
      - 'infra/stacks/**'

# Least privilege permissions
permissions:
  contents: read
  id-token: write  # Required for OIDC

jobs:
  iltero:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      status: ${{ steps.pipeline.outputs.overall_status }}
      environment: ${{ steps.pipeline.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Run Iltero Pipeline
        id: pipeline
        uses: ilterohq/iltero-actions@41bada1ab6681a6de40b2584a109a177f7345d06 # v1
        with:
          stacks_path: infra/stacks
          oidc: 'true'
          org_id: ${{ vars.ILTERO_ORG_ID }}
          # No environment input needed - auto-detected from branch!
        env:
          ILTERO_API_URL: ${{ vars.ILTERO_API_URL }}

  # Optional: Notify on completion
  notify:
    needs: iltero
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send notification
        env:
          PIPELINE_STATUS: ${{ needs.iltero.outputs.status }}
          PIPELINE_ENV: ${{ needs.iltero.outputs.environment }}
        run: |
          if [[ "$PIPELINE_STATUS" == "success" ]]; then
            echo "✅ Pipeline passed for $PIPELINE_ENV"
          else
            echo "❌ Pipeline failed: $PIPELINE_STATUS"
          fi
