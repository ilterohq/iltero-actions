# Iltero Actions - Example Stack Configuration
#
# ⚠️  THIS FILE IS GENERATED BY ILTERO - DO NOT EDIT MANUALLY
#
# This configuration is computed and managed by Iltero based on your
# stack settings in the dashboard. Scheduled compliance scans are
# configured per-stack via the Iltero dashboard and triggered by
# Iltero's scheduler service.
#
# Location: infra/stacks/{stack-name}/config.yml
#
# For brownfield (attached) stacks, see config.brownfield.example.yml instead.

version: 1.0.0

# =============================================================================
# Stack Identification
# =============================================================================
stack:
  # Required: Unique stack identifier (UUID from Iltero)
  id: 0b278217-a809-465a-b9df-00eda8414cb8

  # Required: Human-readable stack name
  name: my-infrastructure

  # Optional: URL-friendly identifier
  slug: my-infrastructure

  # Optional: Workspace this stack belongs to
  workspace: cross-functional

  # Optional: Description
  description: Main infrastructure stack for production services

# =============================================================================
# Policy Bundle Configuration
# =============================================================================
bundle:
  # Optional: Template bundle ID for policy resolution
  template_bundle_id: technology-aws-modern-stack

# =============================================================================
# Terraform Configuration
# =============================================================================
terraform:
  # Optional: Terraform version (default: latest)
  version: 1.5.7

  # Optional: Backend configuration hints
  backend:
    type: s3

# =============================================================================
# Infrastructure Units
# =============================================================================
# Units are processed in dependency order (topological sort based on depends_on)
infrastructure_units:
  - name: network-baseline
    path: units/network-baseline
    enabled: true
    depends_on: []
    description: VPC, subnets, and core networking

  - name: security-baseline
    path: units/security-baseline
    enabled: true
    depends_on: [network-baseline]
    description: Security groups, IAM roles, KMS keys

  - name: database
    path: units/database
    enabled: true
    depends_on: [network-baseline, security-baseline]
    description: RDS instances and related resources

  - name: compute
    path: units/compute
    enabled: true
    depends_on: [network-baseline, security-baseline]
    description: EC2 instances, ECS clusters, Lambda functions

  - name: monitoring
    path: units/monitoring
    enabled: true
    depends_on: [compute, database]
    description: CloudWatch alarms, dashboards, logging

# =============================================================================
# Environment Configurations
# =============================================================================
# Each environment maps to a git branch via git_ref.name
# This enables automatic environment detection without workflow changes
environments:
  # ---------------------------------------------------------------------------
  # Development Environment
  # ---------------------------------------------------------------------------
  development:
    git_ref:
      type: branch
      name: develop                    # develop branch → development environment

    compliance:
      enabled: true
      scan_types: [static, evaluation]
      block_on_violations: true

    monitoring:
      enabled: false                   # Monitoring disabled in dev (save costs)
      alert_channels: []
      log_retention_days: 7            # Shorter retention for dev
      drift_detection:
        enabled: false
        schedule: 0 8 * * 1            # Weekly on Monday (if enabled)
        auto_remediate: false
      compliance_monitoring:
        real_time: false
        alert_on_violations: false

    security:
      severity_threshold: medium       # Allow medium severity in dev

    deployment:
      require_approval: false
      auto_apply_on_merge: false       # Manual apply in dev

    # Optional: Environment-specific variables
    variables:
      TF_VAR_environment: development
      TF_VAR_instance_type: t3.micro

  # ---------------------------------------------------------------------------
  # Staging Environment
  # ---------------------------------------------------------------------------
  staging:
    git_ref:
      type: branch
      name: staging                    # staging branch → staging environment

    compliance:
      enabled: true
      scan_types: [static, evaluation]
      block_on_violations: true

    monitoring:
      enabled: true                    # Monitoring enabled in staging
      alert_channels: []
      log_retention_days: 30
      drift_detection:
        enabled: true
        schedule: 0 */6 * * *          # Every 6 hours
        auto_remediate: false
      compliance_monitoring:
        real_time: false
        alert_on_violations: true

    security:
      severity_threshold: high

    deployment:
      require_approval: false
      auto_apply_on_merge: true        # Auto-deploy on merge to staging

    variables:
      TF_VAR_environment: staging
      TF_VAR_instance_type: t3.small

  # ---------------------------------------------------------------------------
  # Production Environment
  # ---------------------------------------------------------------------------
  production:
    git_ref:
      type: branch
      name: main                       # main branch → production environment

    compliance:
      enabled: true
      scan_types: [static, evaluation]
      block_on_violations: true
      frameworks: [SOC2, ISO27001]     # Extra compliance frameworks

    monitoring:
      enabled: true                    # Monitoring enabled in production
      alert_channels: [slack, email]   # Multiple notification channels
      log_retention_days: 90           # Longer retention for compliance
      drift_detection:
        enabled: true
        schedule: 0 */4 * * *          # Every 4 hours (production)
        auto_remediate: false          # Manual remediation for safety
      compliance_monitoring:
        real_time: false               # Scheduled compliance checks
        alert_on_violations: true      # Alert on any violations

    security:
      severity_threshold: high         # Only fail on high+ severity

    deployment:
      require_approval: true           # Manual approval gate
      auto_apply_on_merge: false
      approval:
        required_approvers: 1
        approval_groups: [security, platform]

    variables:
      TF_VAR_environment: production
      TF_VAR_instance_type: t3.large
