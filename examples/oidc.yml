# =============================================================================
# OIDC Authentication Workflow
# =============================================================================
# This workflow uses OIDC tokens instead of long-lived secrets for Iltero
# authentication. GitHub Actions exchanges its OIDC token for short-lived
# Iltero API and registry tokens automatically.
#
# Benefits:
#   - No ILTERO_TOKEN or ILTERO_REGISTRY_TOKEN secrets needed
#   - Tokens are ephemeral (10-minute lifetime)
#   - Auditable: each token is tied to a specific workflow run
#
# Requirements:
#   - ILTERO_API_URL in repository variables
#   - ILTERO_STACK_ID in repository variables
#   - ILTERO_ORG_ID in repository variables
#   - PipelinePrincipal configured in Iltero for this repository
#   - `permissions: { id-token: write }` in the workflow
#   - AWS credentials (OIDC role or access keys)
# =============================================================================

name: Iltero Infrastructure (OIDC)

on:
  push:
    branches: [main, staging, develop]
    paths:
      - 'infra/stacks/**'
  pull_request:
    paths:
      - 'infra/stacks/**'

permissions:
  contents: read
  pull-requests: write
  actions: read
  id-token: write  # Required for OIDC

jobs:
  # ===========================================================================
  # Option A: Root Action with OIDC
  # ===========================================================================
  # The simplest approach — pass oidc: 'true' to the root action.
  # OIDC exchange, registry configuration, and pipeline execution are all
  # handled automatically.
  # ===========================================================================
  compliance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      compliance_passed: ${{ steps.pipeline.outputs.compliance_passed }}
      environment: ${{ steps.pipeline.outputs.environment }}
      run_id: ${{ steps.pipeline.outputs.run_id }}
      require_approval: ${{ steps.pipeline.outputs.require_approval }}
      deployment_ready: ${{ steps.pipeline.outputs.deployment_ready }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Run Iltero Pipeline
        id: pipeline
        uses: ilterohq/iltero-actions@41bada1ab6681a6de40b2584a109a177f7345d06 # v1
        with:
          stacks_path: infra/stacks
          oidc: 'true'
          stack_id: ${{ vars.ILTERO_STACK_ID }}
          org_id: ${{ vars.ILTERO_ORG_ID }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ILTERO_API_URL: ${{ vars.ILTERO_API_URL }}

  # ===========================================================================
  # Deploy (also uses OIDC — each job gets its own short-lived token)
  # ===========================================================================
  deploy:
    needs: compliance
    if: |
      needs.compliance.outputs.deployment_ready == 'true' &&
      github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: ${{ needs.compliance.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy
        uses: ilterohq/iltero-actions@41bada1ab6681a6de40b2584a109a177f7345d06 # v1
        with:
          stacks_path: infra/stacks
          deploy_only: 'true'
          run_id: ${{ needs.compliance.outputs.run_id }}
          oidc: 'true'
          stack_id: ${{ vars.ILTERO_STACK_ID }}
          org_id: ${{ vars.ILTERO_ORG_ID }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ILTERO_API_URL: ${{ vars.ILTERO_API_URL }}

