# =============================================================================
# ilterohq/iltero-actions/setup
# =============================================================================
# Install Iltero CLI and compliance scanning tools.
#
# This action installs:
#   - Iltero CLI for compliance scan orchestration
#   - Checkov for static infrastructure code analysis (optional)
#   - OPA for policy evaluation on Terraform plans (optional)
#   - Infrastructure toolchain: Terraform, yq, jq (optional)
#
# Usage:
#   - uses: ilterohq/iltero-actions/setup@v1
#     with:
#       install-checkov: 'true'
#       install-opa: 'true'
# =============================================================================

name: Setup Iltero
description: Install Iltero CLI and compliance scanning tools (Checkov, OPA)
author: Iltero

branding:
  icon: download
  color: blue

inputs:
  version:
    description: Iltero CLI version to install
    required: false
    default: 'latest'

  python-version:
    description: Python version to use
    required: false
    default: '3.11'

  install-checkov:
    description: Install Checkov for static analysis
    required: false
    default: 'true'

  install-opa:
    description: Install OPA for policy evaluation
    required: false
    default: 'true'

  opa-version:
    description: OPA version to install
    required: false
    default: '0.60.0'

  install-toolchain:
    description: Also install infrastructure toolchain (Terraform, yq, jq)
    required: false
    default: 'true'

  terraform-version:
    description: Terraform version (only used if install-toolchain is true)
    required: false
    default: '1.5.7'

outputs:
  cli-version:
    description: Installed Iltero CLI version
    value: ${{ steps.verify.outputs.cli-version }}

  checkov-version:
    description: Installed Checkov version
    value: ${{ steps.verify.outputs.checkov-version }}

  opa-version:
    description: Installed OPA version
    value: ${{ steps.verify.outputs.opa-version }}

  terraform-version:
    description: Installed Terraform version
    value: ${{ steps.verify.outputs.terraform-version }}

runs:
  using: composite
  steps:
    # =========================================================================
    # Toolchain: yq, jq, Terraform (conditional on install-toolchain)
    # =========================================================================

    # -------------------------------------------------------------------------
    # Install yq
    # -------------------------------------------------------------------------
    - name: Install yq
      if: inputs.install-toolchain == 'true'
      shell: bash
      run: |
        set -euo pipefail

        YQ_VERSION="v4.35.2"
        ARCH=$(uname -m)
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')

        case "$ARCH" in
          x86_64) ARCH="amd64" ;;
          aarch64|arm64) ARCH="arm64" ;;
        esac

        curl -sSL "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_${OS}_${ARCH}" -o /tmp/yq 2>&1 | grep -v "^  %\|^Dload\|^Total" || true
        sudo mv /tmp/yq /usr/local/bin/yq
        sudo chmod +x /usr/local/bin/yq

        echo "✅ yq installed"

    # -------------------------------------------------------------------------
    # Install jq
    # -------------------------------------------------------------------------
    - name: Install jq
      if: inputs.install-toolchain == 'true'
      shell: bash
      run: |
        set -euo pipefail

        if command -v jq &> /dev/null; then
          exit 0
        fi

        JQ_VERSION="1.7"
        ARCH=$(uname -m)

        case "$ARCH" in
          x86_64) ARCH="amd64" ;;
          aarch64|arm64) ARCH="arm64" ;;
        esac

        curl -sSL "https://github.com/jqlang/jq/releases/download/jq-${JQ_VERSION}/jq-linux-${ARCH}" -o /tmp/jq 2>&1 | grep -v "^  %\|^Dload\|^Total" || true
        sudo mv /tmp/jq /usr/local/bin/jq
        sudo chmod +x /usr/local/bin/jq

        echo "✅ jq installed"

    # -------------------------------------------------------------------------
    # Setup Terraform
    # -------------------------------------------------------------------------
    - name: Setup Terraform
      if: inputs.install-toolchain == 'true'
      uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
      with:
        terraform_version: ${{ inputs.terraform-version }}
        terraform_wrapper: false

    # -------------------------------------------------------------------------
    # Install Python dependencies
    # -------------------------------------------------------------------------
    - name: Install Python dependencies
      if: inputs.install-toolchain == 'true'
      shell: bash
      run: |
        set -euo pipefail
        pip3 install --user --break-system-packages pyyaml jsonschema 2>/dev/null || \
          pip3 install --user pyyaml jsonschema
        echo "✅ Python dependencies installed"

    # =========================================================================
    # CLI and Scanning Tools: Python, Iltero CLI, Checkov, OPA
    # =========================================================================

    # -------------------------------------------------------------------------
    # Setup Python
    # -------------------------------------------------------------------------
    - name: Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}

    # -------------------------------------------------------------------------
    # Install Iltero CLI
    # -------------------------------------------------------------------------
    - name: Install Iltero CLI
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail

        if [ "$INPUT_VERSION" = "latest" ]; then
          pip install --quiet --upgrade iltero-cli 2>&1 | grep -v "^Requirement\|^Collecting\|^Downloading\|^Using cached\|^Installing" || true
        else
          pip install --quiet "iltero-cli==${INPUT_VERSION}" 2>&1 | grep -v "^Requirement\|^Collecting\|^Downloading\|^Using cached\|^Installing" || true
        fi

        echo "✅ Iltero CLI installed"

    # -------------------------------------------------------------------------
    # Install Checkov (optional)
    # -------------------------------------------------------------------------
    - name: Install Checkov
      if: inputs.install-checkov == 'true'
      shell: bash
      run: |
        set -euo pipefail

        pip install --quiet --upgrade --break-system-packages checkov 2>&1 | grep -v "^Requirement\|^Collecting\|^Downloading\|^Using cached\|^Installing" || \
          pip install --quiet --upgrade checkov 2>&1 | grep -v "^Requirement\|^Collecting\|^Downloading\|^Using cached\|^Installing" || true

        echo "✅ Checkov installed"

    # -------------------------------------------------------------------------
    # Install OPA (optional)
    # -------------------------------------------------------------------------
    - name: Install OPA
      if: inputs.install-opa == 'true'
      shell: bash
      env:
        INPUT_OPA_VERSION: ${{ inputs.opa-version }}
      run: |
        set -euo pipefail

        OPA_VERSION="$INPUT_OPA_VERSION"
        ARCH=$(uname -m)
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')

        case "$ARCH" in
          x86_64) ARCH="amd64" ;;
          aarch64|arm64) ARCH="arm64" ;;
        esac

        curl -sSL -o /usr/local/bin/opa \
          "https://openpolicyagent.org/downloads/v${OPA_VERSION}/opa_${OS}_${ARCH}_static" 2>&1 | grep -v "^  %\|^Dload\|^Total" || true
        chmod +x /usr/local/bin/opa

        echo "✅ OPA installed"

    # -------------------------------------------------------------------------
    # Configure CLI
    # -------------------------------------------------------------------------
    - name: Configure CLI
      shell: bash
      run: |
        set -euo pipefail

        # Disable keyring in CI (credentials come from env vars / secrets)
        if [ "${CI:-false}" = "true" ]; then
          echo "PYTHON_KEYRING_BACKEND=keyring.backends.null.Keyring" >> "$GITHUB_ENV"
          echo "ℹ️  CI detected: Using null keyring backend (credentials via env vars)"
        fi

        # Resolve API URL: existing env var > default
        ILTERO_DEFAULT_API_URL="https://api.iltero.io"
        if [ -n "${ILTERO_API_URL:-}" ]; then
          RESOLVED_API_URL="$ILTERO_API_URL"
        else
          RESOLVED_API_URL="$ILTERO_DEFAULT_API_URL"
        fi

        RESOLVED_TOKEN="${ILTERO_TOKEN:-}"

        # Mask secrets in GitHub Actions logs
        if [ -n "$RESOLVED_TOKEN" ]; then
          echo "::add-mask::$RESOLVED_TOKEN"
        fi
        if [ -n "${ILTERO_REGISTRY_TOKEN:-}" ]; then
          echo "::add-mask::$ILTERO_REGISTRY_TOKEN"
        fi

        # Set environment variables for subsequent steps (heredoc-safe)
        {
          echo "ILTERO_API_URL<<GHEOF"
          echo "$RESOLVED_API_URL"
          echo "GHEOF"
        } >> "$GITHUB_ENV"
        echo "ℹ️  API URL: $RESOLVED_API_URL"

        if [ -n "$RESOLVED_TOKEN" ]; then
          {
            echo "ILTERO_TOKEN<<GHEOF"
            echo "$RESOLVED_TOKEN"
            echo "GHEOF"
          } >> "$GITHUB_ENV"
        fi

    # -------------------------------------------------------------------------
    # Verify All Installations
    # -------------------------------------------------------------------------
    - name: Verify Installation
      id: verify
      shell: bash
      env:
        INPUT_INSTALL_CHECKOV: ${{ inputs.install-checkov }}
        INPUT_INSTALL_OPA: ${{ inputs.install-opa }}
        INPUT_INSTALL_TOOLCHAIN: ${{ inputs.install-toolchain }}
      run: |
        set -euo pipefail

        echo "✅ Installation Summary:"

        # Iltero CLI
        CLI_VERSION=$(iltero --version 2>/dev/null || echo "not installed")
        echo "   Iltero CLI: $CLI_VERSION"
        echo "cli-version=$CLI_VERSION" >> "$GITHUB_OUTPUT"

        # Checkov
        if [ "$INPUT_INSTALL_CHECKOV" = "true" ]; then
          CHECKOV_VERSION=$(checkov --version 2>/dev/null || echo "not installed")
          echo "   Checkov: $CHECKOV_VERSION"
          echo "checkov-version=$CHECKOV_VERSION" >> "$GITHUB_OUTPUT"
        fi

        # OPA
        if [ "$INPUT_INSTALL_OPA" = "true" ]; then
          OPA_VERSION=$(opa version 2>/dev/null | head -1 || echo "not installed")
          echo "   OPA: $OPA_VERSION"
          echo "opa-version=$OPA_VERSION" >> "$GITHUB_OUTPUT"
        fi

        # Terraform
        if [ "$INPUT_INSTALL_TOOLCHAIN" = "true" ]; then
          TF_VERSION=$(terraform version -json 2>/dev/null | jq -r '.terraform_version' || echo "not installed")
          echo "   Terraform: $TF_VERSION"
          echo "terraform-version=$TF_VERSION" >> "$GITHUB_OUTPUT"
        fi
