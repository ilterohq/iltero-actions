# =============================================================================
# ilterohq/iltero-actions/deploy
# =============================================================================
# Deploy infrastructure using Terraform and notify Iltero backend.
#
# NOTE: This is a low-level single-unit deployment action. For production
# deployments with compliance checks and authorization, use:
#   ilterohq/iltero-actions@v1 with deploy_only: true
#
# This action:
#   1. Validates self-contained unit structure
#   2. Initializes Terraform with backend configuration
#   3. Runs Terraform plan with environment-specific tfvars
#   4. Applies the plan
#   5. Exports outputs for dependent units
#   6. Notifies Iltero API of deployment status
#   7. Creates GitHub Deployment status
#
# Authorization is NOT checked here - it's the responsibility of the
# calling workflow (pipeline action) to verify authorization before
# invoking this action. This follows single-responsibility principle.
#
# Requires: ilterohq/iltero-actions/setup@v1 to be run first.
#
# IMPORTANT: Uses self-contained units architecture where each unit has:
#   - main.tf, providers.tf, versions.tf, backend.tf in the unit directory
#   - config/{environment}.tfvars for environment-specific variables
#   - config/backend/{environment}.hcl for backend configuration
#
# Usage (via pipeline - recommended):
#   - uses: ilterohq/iltero-actions@v1
#     with:
#       path: infra/stacks/my-stack
#       stack-id: 0b278217-a809-465a-b9df-00eda8414cb8
#       environment: production
#       deploy_only: true
#       run-id: ${{ needs.compliance.outputs.run-id }}
#
# Usage (direct - no authorization):
#   - uses: ilterohq/iltero-actions/deploy@v1
#     with:
#       path: infra/stacks/my-stack/units/network
#       stack-id: 0b278217-a809-465a-b9df-00eda8414cb8
#       unit: network-baseline
#       environment: production
#     env:
#       ILTERO_TOKEN: ${{ secrets.ILTERO_TOKEN }}
#       # ILTERO_API_URL: ${{ vars.ILTERO_API_URL }}  # Optional, defaults to https://api.iltero.io
# =============================================================================

name: Iltero Deploy
description: Deploy infrastructure using Terraform with self-contained units
author: Iltero

branding:
  icon: upload-cloud
  color: green

inputs:
  path:
    description: |
      Path to the self-contained Terraform unit.
      Must contain: main.tf, providers.tf, versions.tf, backend.tf
      Example: 'infra/stacks/my-stack/units/network'
    required: true

  stack-id:
    description: |
      Iltero stack UUID. Get this from your stack's config.yml or the dashboard.
    required: true

  stack-name:
    description: |
      Stack name/slug for display and deployment status.
    required: true

  unit:
    description: |
      Name of the infrastructure unit being deployed.
      For brownfield stacks, defaults to 'default'.
    required: false
    default: 'default'

  environment:
    description: |
      Target environment (e.g., 'production', 'staging', 'development').
    required: true

  run-id:
    description: |
      Chain to an existing Iltero run ID (from evaluation).
      Used for tracking and correlating deployment with compliance results.
    required: false
    default: ''

  auto-approve:
    description: |
      Skip confirmation prompt. Set to 'true' for CI/CD.
    required: false
    default: 'true'

  github-token:
    description: |
      GitHub token for creating deployment status.
      Defaults to GITHUB_TOKEN if not provided.
    required: false
    default: ''

outputs:
  success:
    description: Whether the deployment succeeded (true/false)
    value: ${{ steps.apply.outputs.success }}

  resources-count:
    description: Number of resources managed by this unit
    value: ${{ steps.apply.outputs.resources-count }}

  outputs-file:
    description: Path to the unit outputs JSON file
    value: ${{ steps.apply.outputs.outputs-file }}

runs:
  using: composite
  steps:
    # -------------------------------------------------------------------------
    # Deploy Infrastructure (using shared library)
    # -------------------------------------------------------------------------
    - name: Deploy Infrastructure
      id: apply
      shell: bash
      env:
        DEPLOY_PATH: ${{ inputs.path }}
        STACK_ID: ${{ inputs.stack-id }}
        UNIT_NAME: ${{ inputs.unit }}
        ENVIRONMENT: ${{ inputs.environment }}
        RUN_ID: ${{ inputs.run-id }}
      run: |
        set -euo pipefail

        # Source shared library
        ACTION_DIR="${GITHUB_ACTION_PATH:-$(dirname "$0")/..}"
        source "${ACTION_DIR}/../scripts/lib/iltero-core/index.sh"

        # Validate structure (brownfield uses relaxed validation)
        if [[ "${PIPELINE_MODE:-}" == "brownfield" ]] || [[ -f ".iltero/config.yml" && "$UNIT_NAME" == "default" ]]; then
          validate_brownfield_structure "$DEPLOY_PATH"
        else
          validate_unit_structure "$DEPLOY_PATH"
        fi

        # Run deployment
        set +e
        run_deployment "$DEPLOY_PATH" "$UNIT_NAME" "$ENVIRONMENT" "$RUN_ID"
        EXIT_CODE=$?
        set -e

        # Set outputs using helper
        set_deploy_outputs
        echo "outputs-file=${OUTPUTS_FILE:-}" >> $GITHUB_OUTPUT
        echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

    # -------------------------------------------------------------------------
    # Create GitHub Deployment
    # -------------------------------------------------------------------------
    - name: Create GitHub Deployment
      if: success()
      uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
      env:
        STACK_NAME: ${{ inputs.stack-name }}
        UNIT_NAME: ${{ inputs.unit }}
        ENVIRONMENT: ${{ inputs.environment }}
      with:
        github-token: ${{ inputs.github-token || github.token }}
        script: |
          const stackName = process.env.STACK_NAME;
          const unitName = process.env.UNIT_NAME;
          const environment = process.env.ENVIRONMENT;

          try {
            // Create deployment
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              task: `deploy:${unitName}`,
              auto_merge: false,
              required_contexts: [],
              payload: {
                stack: stackName,
                unit: unitName,
                environment: environment
              },
              environment: environment,
              description: `Deploying ${unitName} unit`
            });

            if (deployment.data.id) {
              // Create deployment status
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployment.data.id,
                state: 'success',
                target_url: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
                description: 'Deployment completed successfully',
                environment: environment
              });

              console.log(`[PASS] GitHub Deployment created for ${unitName}`);
            }
          } catch (error) {
            console.log(`[WARN] Could not create GitHub Deployment: ${error.message}`);
          }
