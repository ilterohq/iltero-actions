# =============================================================================
# ilterohq/iltero-actions
# =============================================================================
# High-level orchestrator for complete infrastructure compliance pipelines.
#
# This is the recommended action for most users. It handles:
#   - Automatic environment detection from branch
#   - Automatic stack detection from changed files
#   - Sequential unit processing with dependency ordering
#   - Compliance scanning (Checkov) and plan evaluation (OPA)
#   - Result submission to Iltero
#
# Usage:
#   - uses: ilterohq/iltero-actions@v1
#     with:
#       stacks_path: infra/stacks
#     env:
#       ILTERO_TOKEN: ${{ secrets.ILTERO_TOKEN }}
#       ILTERO_REGISTRY_TOKEN: ${{ secrets.ILTERO_REGISTRY_TOKEN }}
#       # ILTERO_API_URL: ${{ vars.ILTERO_API_URL }}  # Optional, defaults to https://api.iltero.io
#
# OIDC Usage (no secrets required):
#   - uses: ilterohq/iltero-actions@v1
#     with:
#       stacks_path: infra/stacks
#       oidc: 'true'
#       stack_id: ${{ vars.ILTERO_STACK_ID }}
#       org_id: ${{ vars.ILTERO_ORG_ID }}
#       # ILTERO_API_URL defaults to https://api.iltero.io
#
# For granular control, use individual actions:
#   - ilterohq/iltero-actions/setup@v1
#   - ilterohq/iltero-actions/configure-registry@v1
#   - ilterohq/iltero-actions/scan@v1
#   - ilterohq/iltero-actions/evaluate@v1
# =============================================================================

name: Iltero Pipeline
description: Configuration-driven compliance scanning and deployment for Terraform
author: Iltero

branding:
  icon: shield
  color: blue

inputs:
  stacks_path:
    description: |
      Path to stacks directory (greenfield stacks).
      If not provided, the action checks for .iltero/config.yml (brownfield).
      Example: 'infra/stacks'
    required: false
    default: ''

  config_path:
    description: |
      Path to brownfield config file relative to repository root.
      Used when stacks_path is not set. Default: '.iltero/config.yml'
    required: false
    default: '.iltero/config.yml'

  environment:
    description: |
      Override environment detection. If not provided, the environment is
      automatically detected from the current branch by matching against
      git_ref.name in each environment's config.yml.
      Example: 'production', 'staging', 'development'
    required: false
    default: ''

  stack:
    description: |
      Specific stack to process. If not provided, stacks are automatically
      detected from changed files in the commit/PR.
      Example: 'my-infrastructure'
    required: false
    default: ''

  dry_run:
    description: |
      If true, only run compliance scans without deployment.
      Useful for PR validation.
    required: false
    default: 'false'

  skip_compliance:
    description: |
      If true, skip compliance scanning (useful for emergency deployments).
      Note: This should be used sparingly and may be blocked by policy.
    required: false
    default: 'false'

  deploy_only:
    description: |
      If true, skip compliance scanning and only run deployments.
      Requires run_id from a previous compliance job.
      Use this in deployment jobs that run after approval.
    required: false
    default: 'false'

  run_id:
    description: |
      Existing Iltero run ID to chain to (from compliance job).
      Required when deploy_only is true.
    required: false
    default: ''

  verify_authorization:
    description: |
      If true, verify deployment authorization via Iltero backend.
      When enabled, deploys will fail if the run hasn't been approved.
    required: false
    default: 'true'

  debug:
    description: |
      Enable debug output for troubleshooting.
    required: false
    default: 'false'

  registry_host:
    description: |
      Hostname of Iltero's private Terraform module registry.
      Used with ILTERO_REGISTRY_TOKEN to configure git credentials.
      Default: 'registry.iltero.io'
    required: false
    default: 'registry.iltero.io'

  oidc:
    description: |
      Enable OIDC authentication. When true, exchanges GitHub Actions OIDC
      token for short-lived Iltero tokens instead of using secrets.ILTERO_TOKEN.
      Requires stack_id and org_id inputs.
    required: false
    default: 'false'

  stack_id:
    description: |
      Iltero Stack ID (required when oidc is true).
    required: false
    default: ''

  org_id:
    description: |
      Iltero Organization ID (required when oidc is true).
    required: false
    default: ''

outputs:
  stacks_processed:
    description: JSON array of stacks that were processed
    value: ${{ steps.pipeline.outputs.stacks_processed }}

  overall_status:
    description: |
      Overall pipeline status.
      Values: success, compliance_failed, evaluation_failed, authorization_failed, deploy_failed, skipped
    value: ${{ steps.pipeline.outputs.overall_status }}

  compliance_passed:
    description: Whether all compliance scans passed (true/false)
    value: ${{ steps.pipeline.outputs.compliance_passed }}

  evaluation_passed:
    description: Whether all plan evaluations passed (true/false)
    value: ${{ steps.pipeline.outputs.evaluation_passed }}

  authorization_passed:
    description: Whether deployment authorization passed (true/false, only in deploy mode)
    value: ${{ steps.pipeline.outputs.authorization_passed }}

  environment:
    description: The environment that was detected or used
    value: ${{ steps.pipeline.outputs.environment }}

  run_id:
    description: Iltero run ID for workflow chaining
    value: ${{ steps.pipeline.outputs.run_id }}

  require_approval:
    description: |
      Whether deployment requires manual approval (from config.yml).
      If true, you must use a separate deployment job with GitHub
      environment protection for actual deployments.
    value: ${{ steps.pipeline.outputs.require_approval }}

  approval_id:
    description: |
      Iltero approval ID (when require_approval is true).
      Use this to track or query approval status:
        iltero stack approvals show <approval_id>
    value: ${{ steps.pipeline.outputs.approval_id }}

  deployment_ready:
    description: |
      Whether the pipeline passed and deployment can proceed.
      Use this to conditionally run deployment jobs.
    value: ${{ steps.pipeline.outputs.deployment_ready }}

  unit_results:
    description: |
      JSON array of per-unit scan/evaluation/deploy results.
      Each entry has: unit, scan, evaluation, deploy objects with
      passed/skipped/violations fields. Use for custom reporting.
    value: ${{ steps.pipeline.outputs.unit_results }}

runs:
  using: composite
  steps:
    # =========================================================================
    # SETUP: Install all tools (inlined from setup/, actions/setup-toolchain/,
    #        and actions/setup-iltero-cli/ to avoid nested composite action
    #        path resolution issues when consumed remotely)
    # =========================================================================

    # -------------------------------------------------------------------------
    # Install yq
    # -------------------------------------------------------------------------
    - name: Install yq
      shell: bash
      run: |
        set -euo pipefail

        YQ_VERSION="v4.35.2"
        ARCH=$(uname -m)
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')

        case "$ARCH" in
          x86_64) ARCH="amd64" ;;
          aarch64|arm64) ARCH="arm64" ;;
        esac

        curl -sSL "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_${OS}_${ARCH}" -o /tmp/yq 2>&1 | grep -v "^  %\|^Dload\|^Total" || true
        sudo mv /tmp/yq /usr/local/bin/yq
        sudo chmod +x /usr/local/bin/yq

        echo "✅ yq installed"

    # -------------------------------------------------------------------------
    # Install jq
    # -------------------------------------------------------------------------
    - name: Install jq
      shell: bash
      run: |
        set -euo pipefail

        if command -v jq &> /dev/null; then
          exit 0
        fi

        JQ_VERSION="1.7"
        ARCH=$(uname -m)

        case "$ARCH" in
          x86_64) ARCH="amd64" ;;
          aarch64|arm64) ARCH="arm64" ;;
        esac

        curl -sSL "https://github.com/jqlang/jq/releases/download/jq-${JQ_VERSION}/jq-linux-${ARCH}" -o /tmp/jq 2>&1 | grep -v "^  %\|^Dload\|^Total" || true
        sudo mv /tmp/jq /usr/local/bin/jq
        sudo chmod +x /usr/local/bin/jq

        echo "✅ jq installed"

    # -------------------------------------------------------------------------
    # Setup Terraform
    # -------------------------------------------------------------------------
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
      with:
        terraform_version: '1.5.7'
        terraform_wrapper: false

    # -------------------------------------------------------------------------
    # Install Python dependencies
    # -------------------------------------------------------------------------
    - name: Install Python dependencies
      shell: bash
      run: |
        set -euo pipefail
        pip3 install --user --break-system-packages pyyaml jsonschema 2>/dev/null || \
          pip3 install --user pyyaml jsonschema
        echo "✅ Python dependencies installed"

    # -------------------------------------------------------------------------
    # Setup Python
    # -------------------------------------------------------------------------
    - name: Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.11'

    # -------------------------------------------------------------------------
    # Install Iltero CLI
    # -------------------------------------------------------------------------
    - name: Install Iltero CLI
      shell: bash
      run: |
        set -euo pipefail
        pip install --quiet --upgrade iltero-cli 2>&1 | grep -v "^Requirement\|^Collecting\|^Downloading\|^Using cached\|^Installing" || true
        echo "✅ Iltero CLI installed"

    # -------------------------------------------------------------------------
    # Install Checkov
    # -------------------------------------------------------------------------
    - name: Install Checkov
      shell: bash
      run: |
        set -euo pipefail
        pip install --quiet --upgrade --break-system-packages checkov 2>&1 | grep -v "^Requirement\|^Collecting\|^Downloading\|^Using cached\|^Installing" || \
          pip install --quiet --upgrade checkov 2>&1 | grep -v "^Requirement\|^Collecting\|^Downloading\|^Using cached\|^Installing" || true
        echo "✅ Checkov installed"

    # -------------------------------------------------------------------------
    # Install OPA
    # -------------------------------------------------------------------------
    - name: Install OPA
      shell: bash
      run: |
        set -euo pipefail

        OPA_VERSION="0.60.0"
        ARCH=$(uname -m)
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')

        case "$ARCH" in
          x86_64) ARCH="amd64" ;;
          aarch64|arm64) ARCH="arm64" ;;
        esac

        curl -sSL -o /usr/local/bin/opa \
          "https://openpolicyagent.org/downloads/v${OPA_VERSION}/opa_${OS}_${ARCH}_static" 2>&1 | grep -v "^  %\|^Dload\|^Total" || true
        chmod +x /usr/local/bin/opa

        echo "✅ OPA installed"

    # -------------------------------------------------------------------------
    # Configure CLI (keyring, API URL, token masking)
    # -------------------------------------------------------------------------
    - name: Configure CLI
      shell: bash
      run: |
        set -euo pipefail

        # Disable keyring in CI (credentials come from env vars / secrets)
        if [ "${CI:-false}" = "true" ]; then
          echo "PYTHON_KEYRING_BACKEND=keyring.backends.null.Keyring" >> "$GITHUB_ENV"
          echo "ℹ️  CI detected: Using null keyring backend (credentials via env vars)"
        fi

        # Resolve API URL: existing env var > default
        ILTERO_DEFAULT_API_URL="https://api.iltero.io"
        if [ -n "${ILTERO_API_URL:-}" ]; then
          RESOLVED_API_URL="$ILTERO_API_URL"
        else
          RESOLVED_API_URL="$ILTERO_DEFAULT_API_URL"
        fi

        # Resolve API token from env var
        RESOLVED_TOKEN="${ILTERO_TOKEN:-}"

        # Mask secrets in GitHub Actions logs
        if [ -n "$RESOLVED_TOKEN" ]; then
          echo "::add-mask::$RESOLVED_TOKEN"
        fi
        if [ -n "${ILTERO_REGISTRY_TOKEN:-}" ]; then
          echo "::add-mask::$ILTERO_REGISTRY_TOKEN"
        fi

        # Set environment variables for subsequent steps (heredoc-safe)
        {
          echo "ILTERO_API_URL<<GHEOF"
          echo "$RESOLVED_API_URL"
          echo "GHEOF"
        } >> "$GITHUB_ENV"
        echo "ℹ️  API URL: $RESOLVED_API_URL"

        if [ -n "$RESOLVED_TOKEN" ]; then
          {
            echo "ILTERO_TOKEN<<GHEOF"
            echo "$RESOLVED_TOKEN"
            echo "GHEOF"
          } >> "$GITHUB_ENV"
        fi

    # -------------------------------------------------------------------------
    # Verify Installation
    # -------------------------------------------------------------------------
    - name: Verify Installation
      id: setup
      shell: bash
      run: |
        set -euo pipefail

        echo "✅ Installation Summary:"

        CLI_VERSION=$(iltero --version 2>/dev/null || echo "not installed")
        echo "   Iltero CLI: $CLI_VERSION"

        CHECKOV_VERSION=$(checkov --version 2>/dev/null || echo "not installed")
        echo "   Checkov: $CHECKOV_VERSION"

        OPA_VERSION=$(opa version 2>/dev/null | head -1 || echo "not installed")
        echo "   OPA: $OPA_VERSION"

        TF_VERSION=$(terraform version -json 2>/dev/null | jq -r '.terraform_version' || echo "not installed")
        echo "   Terraform: $TF_VERSION"

    # =========================================================================
    # OIDC AUTHENTICATION (optional, when oidc input is true)
    # Inlined from setup-oidc/ to avoid nested composite action issues.
    # =========================================================================

    # -------------------------------------------------------------------------
    # Verify CLI available for OIDC
    # -------------------------------------------------------------------------
    - name: OIDC - Verify CLI Available
      if: inputs.oidc == 'true'
      shell: bash
      run: |
        set -euo pipefail
        if ! command -v iltero &>/dev/null; then
          echo "::error::Iltero CLI not found."
          exit 1
        fi

    # -------------------------------------------------------------------------
    # Exchange OIDC token via CLI
    # -------------------------------------------------------------------------
    - name: OIDC - Exchange Token
      id: oidc_exchange
      if: inputs.oidc == 'true'
      shell: bash
      env:
        ILTERO_STACK_ID: ${{ inputs.stack_id }}
        ILTERO_ORG_ID: ${{ inputs.org_id }}
      run: |
        set -euo pipefail

        ARGS=(
          --stack-id "$ILTERO_STACK_ID"
          --org-id "$ILTERO_ORG_ID"
          --format github-actions
        )

        # Use ILTERO_API_URL (already set by Configure CLI step, with default)
        if [[ -n "${ILTERO_API_URL:-}" ]]; then
          ARGS+=(--api-url "$ILTERO_API_URL")
        fi

        iltero auth oidc "${ARGS[@]}"

    # =========================================================================
    # CONFIGURE REGISTRY
    # Inlined from configure-registry/ to avoid nested composite action issues.
    # =========================================================================
    - name: Configure Registry
      id: registry
      shell: bash
      env:
        REGISTRY_HOST: ${{ inputs.registry_host }}
      run: |
        set -euo pipefail

        # Source shared library
        ACTION_DIR="${GITHUB_ACTION_PATH:-$(dirname "$0")/..}"
        source "${ACTION_DIR}/scripts/lib/iltero-core/index.sh"

        # Use OIDC registry token if available, otherwise use env var
        TOKEN="${ILTERO_REGISTRY_TOKEN:-}"

        if configure_registry "$TOKEN" "$REGISTRY_HOST"; then
          if [[ -n "$TOKEN" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi
        else
          echo "configured=false" >> "$GITHUB_OUTPUT"
          exit 1
        fi

    # -------------------------------------------------------------------------
    # Step 3: Validate Inputs
    # -------------------------------------------------------------------------
    - name: Validate Inputs
      id: validate
      shell: bash
      env:
        INPUT_STACKS_PATH: ${{ inputs.stacks_path }}
        INPUT_CONFIG_PATH: ${{ inputs.config_path }}
      run: |
        set -euo pipefail

        STACKS_PATH="$INPUT_STACKS_PATH"
        CONFIG_PATH="$INPUT_CONFIG_PATH"

        # Detect pipeline mode
        if [[ -n "$STACKS_PATH" ]] && [[ -d "$STACKS_PATH" ]]; then
          PIPELINE_MODE="greenfield"
          echo "pipeline_mode=greenfield" >> $GITHUB_OUTPUT
          echo "config_path=" >> $GITHUB_OUTPUT
          echo "✅ Inputs validated (greenfield)"
          echo "   Stacks path: $STACKS_PATH"
        elif [[ -f "$CONFIG_PATH" ]]; then
          PIPELINE_MODE="brownfield"
          echo "pipeline_mode=brownfield" >> $GITHUB_OUTPUT
          echo "config_path=$CONFIG_PATH" >> $GITHUB_OUTPUT
          echo "✅ Inputs validated (brownfield)"
          echo "   Config path: $CONFIG_PATH"
        else
          echo "::error::Neither stacks directory ($STACKS_PATH) nor brownfield config ($CONFIG_PATH) found"
          exit 1
        fi

    # -------------------------------------------------------------------------
    # Step 4: Run Pipeline
    # -------------------------------------------------------------------------
    - name: Run Iltero Pipeline
      id: pipeline
      shell: bash
      env:
        STACKS_PATH: ${{ inputs.stacks_path }}
        PIPELINE_MODE: ${{ steps.validate.outputs.pipeline_mode }}
        CONFIG_PATH: ${{ steps.validate.outputs.config_path }}
        ENVIRONMENT_OVERRIDE: ${{ inputs.environment }}
        MANUAL_STACK: ${{ inputs.stack }}
        DRY_RUN: ${{ inputs.dry_run }}
        SKIP_COMPLIANCE: ${{ inputs.skip_compliance }}
        DEPLOY_ONLY: ${{ inputs.deploy_only }}
        RUN_ID: ${{ inputs.run_id }}
        VERIFY_AUTHORIZATION: ${{ inputs.verify_authorization }}
        DEBUG: ${{ inputs.debug }}
        REGISTRY_HOST: ${{ inputs.registry_host }}
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        GITHUB_REF: ${{ github.ref }}
        GITHUB_BASE_REF: ${{ github.base_ref }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        GITHUB_SERVER_URL: ${{ github.server_url }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        # Run the main pipeline script
        "${{ github.action_path }}/scripts/run-pipeline.sh"

    # -------------------------------------------------------------------------
    # Step 5: Generate Summary
    # -------------------------------------------------------------------------
    - name: Generate Summary
      if: always()
      shell: bash
      env:
        OVERALL_STATUS: ${{ steps.pipeline.outputs.overall_status }}
        STACKS_PROCESSED: ${{ steps.pipeline.outputs.stacks_processed }}
        COMPLIANCE_PASSED: ${{ steps.pipeline.outputs.compliance_passed }}
        EVALUATION_PASSED: ${{ steps.pipeline.outputs.evaluation_passed }}
        ENVIRONMENT: ${{ steps.pipeline.outputs.environment }}
        UNIT_RESULTS: ${{ steps.pipeline.outputs.unit_results }}
      run: |
        "${{ github.action_path }}/scripts/generate-summary.sh"
