# =============================================================================
# Setup Iltero CLI - Internal Action
# =============================================================================
# Purpose: Install compliance scanning tools (Iltero CLI, Checkov, OPA)
#
# This is an internal action bundled with iltero-actions. It installs:
#   - Iltero CLI for compliance scan orchestration and webhook submission
#   - Checkov for static infrastructure code analysis
#   - OPA for policy evaluation on Terraform plans
#
# Optionally includes the base toolchain (Terraform, yq, jq) via the
# install-toolchain input for workflows that need both scanning AND deployment.
# =============================================================================

name: Setup Iltero CLI
description: Install compliance scanning tools (Iltero CLI, Checkov, OPA) with optional infrastructure toolchain

inputs:
  version:
    description: Iltero CLI version to install
    required: false
    default: 'latest'
  python-version:
    description: Python version to use
    required: false
    default: '3.11'
  install-checkov:
    description: Install Checkov for static analysis
    required: false
    default: 'true'
  install-opa:
    description: Install OPA for policy evaluation
    required: false
    default: 'false'
  opa-version:
    description: OPA version to install
    required: false
    default: '0.60.0'
  install-toolchain:
    description: Also install infrastructure toolchain (Terraform, yq, jq)
    required: false
    default: 'false'
  terraform-version:
    description: Terraform version (only used if install-toolchain is true)
    required: false
    default: '1.5.7'
  api-url:
    description: |
      Iltero API URL. Defaults to https://api.iltero.io if not provided.
      Can also be set via ILTERO_API_URL environment variable.
    required: false
    default: ''
  api-token:
    description: Iltero API token
    required: false
    default: ''

outputs:
  cli-version:
    description: Installed CLI version
    value: ${{ steps.verify.outputs.version }}
  checkov-version:
    description: Installed Checkov version
    value: ${{ steps.verify.outputs.checkov-version }}
  opa-version:
    description: Installed OPA version
    value: ${{ steps.verify.outputs.opa-version }}

runs:
  using: composite
  steps:
    # -------------------------------------------------------------------------
    # Install yq (optional - when toolchain requested)
    # -------------------------------------------------------------------------
    - name: Install yq
      if: inputs.install-toolchain == 'true'
      shell: bash
      run: |
        set -euo pipefail

        YQ_VERSION="v4.35.2"
        ARCH=$(uname -m)
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')

        case "$ARCH" in
          x86_64) ARCH="amd64" ;;
          aarch64|arm64) ARCH="arm64" ;;
        esac

        curl -sSL "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_${OS}_${ARCH}" -o /tmp/yq 2>&1 | grep -v "^  %\|^Dload\|^Total" || true
        sudo mv /tmp/yq /usr/local/bin/yq
        sudo chmod +x /usr/local/bin/yq

        echo "✅ yq installed"

    # -------------------------------------------------------------------------
    # Install jq (optional - when toolchain requested)
    # -------------------------------------------------------------------------
    - name: Install jq
      if: inputs.install-toolchain == 'true'
      shell: bash
      run: |
        set -euo pipefail

        if command -v jq &> /dev/null; then
          exit 0
        fi

        JQ_VERSION="1.7"
        ARCH=$(uname -m)

        case "$ARCH" in
          x86_64) ARCH="amd64" ;;
          aarch64|arm64) ARCH="arm64" ;;
        esac

        curl -sSL "https://github.com/jqlang/jq/releases/download/jq-${JQ_VERSION}/jq-linux-${ARCH}" -o /tmp/jq 2>&1 | grep -v "^  %\|^Dload\|^Total" || true
        sudo mv /tmp/jq /usr/local/bin/jq
        sudo chmod +x /usr/local/bin/jq

        echo "✅ jq installed"

    # -------------------------------------------------------------------------
    # Setup Terraform (optional - when toolchain requested)
    # -------------------------------------------------------------------------
    - name: Setup Terraform
      if: inputs.install-toolchain == 'true'
      uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
      with:
        terraform_version: ${{ inputs.terraform-version }}
        terraform_wrapper: false

    # -------------------------------------------------------------------------
    # Install Python dependencies (optional - when toolchain requested)
    # -------------------------------------------------------------------------
    - name: Install Python dependencies
      if: inputs.install-toolchain == 'true'
      shell: bash
      run: |
        set -euo pipefail
        pip3 install --user --break-system-packages pyyaml jsonschema 2>/dev/null || \
          pip3 install --user pyyaml jsonschema
        echo "✅ Python dependencies installed"

    # -------------------------------------------------------------------------
    # Setup Python
    # -------------------------------------------------------------------------
    - name: Setup Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: ${{ inputs.python-version }}

    # -------------------------------------------------------------------------
    # Install Iltero CLI
    # -------------------------------------------------------------------------
    - name: Install Iltero CLI
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail

        if [ "$INPUT_VERSION" = "latest" ]; then
          pip install --quiet --upgrade iltero-cli 2>&1 | grep -v "^Requirement\|^Collecting\|^Downloading\|^Using cached\|^Installing" || true
        else
          pip install --quiet "iltero-cli==${INPUT_VERSION}" 2>&1 | grep -v "^Requirement\|^Collecting\|^Downloading\|^Using cached\|^Installing" || true
        fi

        echo "✅ Iltero CLI installed"

    # -------------------------------------------------------------------------
    # Install Checkov (optional)
    # -------------------------------------------------------------------------
    - name: Install Checkov
      if: inputs.install-checkov == 'true'
      shell: bash
      run: |
        set -euo pipefail

        pip install --quiet --upgrade --break-system-packages checkov 2>&1 | grep -v "^Requirement\|^Collecting\|^Downloading\|^Using cached\|^Installing" || \
          pip install --quiet --upgrade checkov 2>&1 | grep -v "^Requirement\|^Collecting\|^Downloading\|^Using cached\|^Installing" || true

        echo "✅ Checkov installed"

    # -------------------------------------------------------------------------
    # Install OPA (optional)
    # -------------------------------------------------------------------------
    - name: Install OPA
      if: inputs.install-opa == 'true'
      shell: bash
      env:
        INPUT_OPA_VERSION: ${{ inputs.opa-version }}
      run: |
        set -euo pipefail

        OPA_VERSION="$INPUT_OPA_VERSION"
        ARCH=$(uname -m)
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')

        case "$ARCH" in
          x86_64) ARCH="amd64" ;;
          aarch64|arm64) ARCH="arm64" ;;
        esac

        curl -sSL -o /usr/local/bin/opa \
          "https://openpolicyagent.org/downloads/v${OPA_VERSION}/opa_${OS}_${ARCH}_static" 2>&1 | grep -v "^  %\|^Dload\|^Total" || true
        chmod +x /usr/local/bin/opa

        echo "✅ OPA installed"

    # -------------------------------------------------------------------------
    # Configure CLI
    # -------------------------------------------------------------------------
    - name: Configure CLI
      shell: bash
      env:
        INPUT_API_URL: ${{ inputs.api-url }}
        INPUT_API_TOKEN: ${{ inputs.api-token }}
      run: |
        set -euo pipefail
        # =================================================================
        # Disable keyring in CI environments
        # =================================================================
        # In CI, credentials should come from environment variables (secrets)
        # not from system keyring. CI containers don't have keyring backends
        # (D-Bus, gnome-keyring, etc.) so we use the null backend.
        #
        # The null backend makes keyring operations no-ops, preventing
        # errors while ensuring credentials flow through env vars.
        #
        # Security guarantees:
        # - Credentials come from GitHub Secrets -> ILTERO_TOKEN env var
        # - CI containers are ephemeral (no persistent credential storage)
        # - Local dev still uses real keyring for secure credential storage
        # =================================================================
        if [ "${CI:-false}" = "true" ]; then
          echo "PYTHON_KEYRING_BACKEND=keyring.backends.null.Keyring" >> "$GITHUB_ENV"
          echo "ℹ️  CI detected: Using null keyring backend (credentials via env vars)"
        fi

        # Resolve API URL: input > existing env var > default
        ILTERO_DEFAULT_API_URL="https://api.iltero.io"
        if [ -n "$INPUT_API_URL" ]; then
          RESOLVED_API_URL="$INPUT_API_URL"
        elif [ -n "${ILTERO_API_URL:-}" ]; then
          RESOLVED_API_URL="$ILTERO_API_URL"
        else
          RESOLVED_API_URL="$ILTERO_DEFAULT_API_URL"
        fi

        # Resolve API token: input > existing env var
        RESOLVED_TOKEN="${INPUT_API_TOKEN:-${ILTERO_TOKEN:-}}"

        # Mask secrets in GitHub Actions logs
        if [ -n "$RESOLVED_TOKEN" ]; then
          echo "::add-mask::$RESOLVED_TOKEN"
        fi
        if [ -n "${ILTERO_REGISTRY_TOKEN:-}" ]; then
          echo "::add-mask::$ILTERO_REGISTRY_TOKEN"
        fi

        # Set environment variables for subsequent steps (heredoc-safe)
        {
          echo "ILTERO_API_URL<<GHEOF"
          echo "$RESOLVED_API_URL"
          echo "GHEOF"
        } >> "$GITHUB_ENV"

        if [ -n "$RESOLVED_TOKEN" ]; then
          {
            echo "ILTERO_TOKEN<<GHEOF"
            echo "$RESOLVED_TOKEN"
            echo "GHEOF"
          } >> "$GITHUB_ENV"
        fi

    # -------------------------------------------------------------------------
    # Verify Installation
    # -------------------------------------------------------------------------
    - name: Verify Installation
      id: verify
      shell: bash
      env:
        INPUT_INSTALL_CHECKOV: ${{ inputs.install-checkov }}
        INPUT_INSTALL_OPA: ${{ inputs.install-opa }}
      run: |
        set -euo pipefail

        echo "Verifying installations..."

        # Verify Iltero CLI
        CLI_VERSION=$(iltero --version 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || echo "unknown")
        echo "version=$CLI_VERSION" >> "$GITHUB_OUTPUT"
        echo "✅ Iltero CLI: $CLI_VERSION"

        # Verify Checkov
        if [ "$INPUT_INSTALL_CHECKOV" = "true" ]; then
          CHECKOV_VERSION=$(checkov --version 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || echo "unknown")
          echo "checkov-version=$CHECKOV_VERSION" >> "$GITHUB_OUTPUT"
          echo "✅ Checkov: $CHECKOV_VERSION"
        fi

        # Verify OPA
        if [ "$INPUT_INSTALL_OPA" = "true" ]; then
          OPA_VERSION=$(opa version 2>/dev/null | grep -oE 'Version: [0-9]+\.[0-9]+\.[0-9]+' | cut -d' ' -f2 || echo "unknown")
          echo "opa-version=$OPA_VERSION" >> "$GITHUB_OUTPUT"
          echo "✅ OPA: $OPA_VERSION"
        fi

        echo ""
        echo "All tools installed successfully!"
