# =============================================================================
# Setup Iltero Toolchain - Internal Action
# =============================================================================
# Purpose: Install infrastructure deployment tools (Terraform, yq, jq)
#
# This is an internal action bundled with iltero-actions. It installs:
#   - Terraform for infrastructure provisioning
#   - yq for YAML parsing
#   - jq for JSON parsing
#   - Python dependencies for validation scripts
# =============================================================================

name: Setup Iltero Toolchain
description: Install infrastructure deployment tools (Terraform, yq, jq) for Iltero platform

inputs:
  terraform_version:
    description: Terraform version to install
    required: false
    default: '1.5.7'
  install_yq:
    description: Whether to install yq
    required: false
    default: 'true'
  install_jq:
    description: Whether to install jq
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    # -------------------------------------------------------------------------
    # Install yq
    # -------------------------------------------------------------------------
    - name: Install yq with verification
      if: inputs.install_yq == 'true'
      shell: bash
      run: |
        set -euo pipefail

        # Version and checksum for yq
        YQ_VERSION="v4.35.2"

        # Detect architecture
        ARCH=$(uname -m)
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')

        case "$ARCH" in
          x86_64) ARCH="amd64" ;;
          aarch64|arm64) ARCH="arm64" ;;
        esac

        # Download yq
        curl -sSL "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_${OS}_${ARCH}" -o /tmp/yq 2>&1 | grep -v "^  %\|^Dload\|^Total" || true

        # Install
        sudo mv /tmp/yq /usr/local/bin/yq
        sudo chmod +x /usr/local/bin/yq

        echo "✅ yq installed"

    # -------------------------------------------------------------------------
    # Install jq
    # -------------------------------------------------------------------------
    - name: Install jq with verification
      if: inputs.install_jq == 'true'
      shell: bash
      run: |
        set -euo pipefail

        # Check if jq is already installed
        if command -v jq &> /dev/null; then
          exit 0
        fi

        # Version for jq
        JQ_VERSION="1.7"

        # Detect architecture
        ARCH=$(uname -m)

        case "$ARCH" in
          x86_64) ARCH="amd64" ;;
          aarch64|arm64) ARCH="arm64" ;;
        esac

        # Download jq
        curl -sSL "https://github.com/jqlang/jq/releases/download/jq-${JQ_VERSION}/jq-linux-${ARCH}" -o /tmp/jq 2>&1 | grep -v "^  %\|^Dload\|^Total" || true

        # Install
        sudo mv /tmp/jq /usr/local/bin/jq
        sudo chmod +x /usr/local/bin/jq

        echo "✅ jq installed"

    # -------------------------------------------------------------------------
    # Setup Terraform
    # -------------------------------------------------------------------------
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform_version }}
        terraform_wrapper: false

    # -------------------------------------------------------------------------
    # Install Python dependencies
    # -------------------------------------------------------------------------
    - name: Install Python dependencies
      shell: bash
      run: |
        set -euo pipefail

        # Install Python dependencies for validation scripts
        # Use --break-system-packages for PEP 668 compliant environments
        pip3 install --user --break-system-packages pyyaml jsonschema 2>/dev/null || \
          pip3 install --user pyyaml jsonschema

        echo "✅ Python dependencies installed"

    # -------------------------------------------------------------------------
    # Verify all tools
    # -------------------------------------------------------------------------
    - name: Verify all tools
      shell: bash
      run: |
        set -euo pipefail

        echo "Verifying installed tools..."

        # Check Terraform
        if ! command -v terraform &> /dev/null; then
          echo "::error::Terraform not found"
          exit 1
        fi
        echo "✅ Terraform: $(terraform version -json | jq -r '.terraform_version')"

        # Check yq if installed
        if [[ "${{ inputs.install_yq }}" == "true" ]]; then
          if ! command -v yq &> /dev/null; then
            echo "::error::yq not found"
            exit 1
          fi
          echo "✅ yq: $(yq --version)"
        fi

        # Check jq if installed
        if [[ "${{ inputs.install_jq }}" == "true" ]]; then
          if ! command -v jq &> /dev/null; then
            echo "::error::jq not found"
            exit 1
          fi
          echo "✅ jq: $(jq --version)"
        fi

        # Check Python
        echo "✅ Python: $(python3 --version)"

        echo ""
        echo "All tools verified successfully!"
