name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the information below to help us investigate.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Configure stack with...
        2. Run workflow with...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages and logs if available.
    validations:
      required: true

  - type: input
    id: action-version
    attributes:
      label: Action Version
      description: The version of iltero-actions you are using.
      placeholder: "v1.0.0 or commit SHA"
    validations:
      required: true

  - type: input
    id: terraform-version
    attributes:
      label: Terraform Version
      description: Output of `terraform version`.
      placeholder: "1.9.0"
    validations:
      required: false

  - type: dropdown
    id: runner-os
    attributes:
      label: Runner OS
      options:
        - ubuntu-latest
        - ubuntu-22.04
        - ubuntu-24.04
        - Other (specify in description)
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Stack Configuration
      description: Relevant parts of your `config.yml` (redact any sensitive values).
      render: yaml
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or log output.
    validations:
      required: false
